version: 2.1

jobs:
  build-and-test:
    machine:
      image: ubuntu-2004:current
      docker_layer_caching: true
    steps:
      - checkout
      - run: make deps
      - run: make lint
      - run: make test
      - run: make docker_push

workflows:
  main_workflow:
    jobs:
      - build-and-test